name: PR quality gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: 22.23.1

jobs:
  quality:
    name: Unit, intents, types, build, audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Validate canonical intents
        run: npm run test:intents

      - name: Check ADR intent parity
        shell: bash
        run: |
          set -euo pipefail
          adr='docs/adr/ADR-0008-cross-repo-canon-reference.md'
          # Markdown backticks must remain literal.
          # shellcheck disable=SC2016
          grep -Fqx -- '| Cloudia browser -> corsweb handoff | `contract-dev`, `grift-team-beta`, `grift-paid-trial`, `estimate-audit` |' "$adr"
          # shellcheck disable=SC2016
          grep -Fqx -- '| corsweb Worker -> Grift outbound | `contract-dev` |' "$adr"

      - name: Type-check
        run: npm run typecheck

      - name: Build production bundle
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev

  browser-e2e:
    name: Browser E2E (Chromium)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Install Playwright Chromium and OS dependencies
        run: npx --no-install playwright install --with-deps chromium

      - name: Run browser E2E
        run: npm run test:e2e
